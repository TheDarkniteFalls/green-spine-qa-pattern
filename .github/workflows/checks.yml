name: checks

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python3 spine_green.py
      - run: python3 spine_green.py examples/spine_case.json
      - run: python3 -m py_compile spine_green.py
